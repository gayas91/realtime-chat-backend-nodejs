services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: realtime-chat-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MONGODB_URI: mongodb://mongodb:27017/realtime_chat
      REDIS_URL: redis://redis:6379
      PORT: 5000
    ports:
      - "${PORT:-5001}:5000"
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5000/api/v1/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    networks:
      - realtime-chat-network

  mongodb:
    image: mongo:7
    container_name: realtime-chat-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - realtime-chat-network

  redis:
    image: redis:7-alpine
    container_name: realtime-chat-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - realtime-chat-network

networks:
  realtime-chat-network:
    driver: bridge

volumes:
  mongodb_data:
  redis_data:
