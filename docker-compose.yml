services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MONGODB_URI: mongodb://mongodb:27017/realtime_chat
      REDIS_URL: redis://redis:6379
      PORT: 5000
    ports:
      - "${PORT:-5001}:5000"
    volumes:
      - uploads_data:/usr/src/app/uploads
    depends_on:
      uploads-permissions:
        condition: service_completed_successfully
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5000/api/v1/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    networks:
      - realtime-chat-network

  uploads-permissions:
    image: alpine:3.20
    restart: "no"
    command: sh -c "mkdir -p /usr/src/app/uploads && chown -R 1000:1000 /usr/src/app/uploads"
    volumes:
      - uploads_data:/usr/src/app/uploads
    networks:
      - realtime-chat-network

  mongodb:
    image: mongo:7
    container_name: realtime-chat-mongodb
    restart: unless-stopped
    ports:
      - "27018:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - realtime-chat-network

  redis:
    image: redis:7-alpine
    container_name: realtime-chat-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - realtime-chat-network

networks:
  realtime-chat-network:
    driver: bridge

volumes:
  mongodb_data:
  redis_data:
  uploads_data:
